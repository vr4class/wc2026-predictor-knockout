<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Predictor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-xl bg-gray-800 rounded-2xl shadow-2xl p-6 border border-gray-700">
        <h1 class="text-3xl font-extrabold text-center mb-2 text-yellow-500">🏆 2026 World Cup Predictor</h1>
        <p class="text-sm text-gray-400 text-center mb-6">Round of 32 Simulation Model (With Score Projections)</p>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Team A</label>
                <select id="teamA" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white focus:ring-yellow-500 focus:border-yellow-500"></select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Team B</label>
                <select id="teamB" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white focus:ring-yellow-500 focus:border-yellow-500"></select>
            </div>
        </div>

        <button id="simulateBtn" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-900 font-bold py-3 px-4 rounded-lg transition duration-200 cursor-pointer text-center text-lg">
            🚀 Run 10,000 Simulations
        </button>

        <div id="results" class="mt-8 hidden space-y-6">
            
            <div class="bg-gray-900 border border-yellow-500/30 rounded-xl p-4 text-center">
                <span class="text-xs font-bold uppercase text-yellow-500 tracking-wider">Most Likely Regular Time Score</span>
                <div class="text-4xl font-black my-1" id="predictedScore">0 - 0</div>
                <p class="text-xs text-gray-400" id="overtimeNotice"></p>
            </div>

            <div class="bg-gray-750 border border-gray-700 rounded-xl p-4">
                <h4 class="text-sm font-bold uppercase text-gray-400 mb-2 flex items-center gap-1">🔑 Tactical Match Insight</h4>
                <p class="text-sm text-gray-200 leading-relaxed" id="matchInsight">Loading analytics...</p>
            </div>

            <div class="space-y-4">
                <h3 class="text-md font-bold uppercase text-gray-400 tracking-wide border-b border-gray-700 pb-1">Probability to Advance</h3>
                
                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span id="nameA">Team A</span>
                        <span id="probA">0%</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-4">
                        <div id="barA" class="bg-blue-500 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between text-sm font-semibold mb-1">
                        <span id="nameB">Team B</span>
                        <span id="probB">0%</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-4">
                        <div id="barB" class="bg-red-500 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. Enhanced 2026 Data Dictionary (All confirmed teams from your bracket screenshot)
        const teamsData = {
            'Argentina': { elo: 2150, xgAtt: 2.20, xgDef: 0.60, host: 0.0, depth: 9.5, insight: "Lionel Messi's playmaking combined with relentless team work-rate makes them formidable in tight spaces." },
            'Australia': { elo: 1650, xgAtt: 1.10, xgDef: 1.40, host: 0.0, depth: 4.5, insight: "Relies on immense physicality and set-piece threats to disrupt highly technical opponents." },
            'Belgium': { elo: 1900, xgAtt: 1.90, xgDef: 1.00, host: 0.0, depth: 8.0, insight: "Kevin De Bruyne remains the central creative hub, capable of threading passes through deep defensive blocks." },
            'Bosnia': { elo: 1750, xgAtt: 1.15, xgDef: 1.50, host: 0.0, depth: 4.5, insight: "Ermedin Demirović leads a highly physical frontline. Their path to victory lies in structural low-blocks." },
            'Brazil': { elo: 2110, xgAtt: 2.45, xgDef: 0.55, host: 0.0, depth: 9.5, insight: "Vinícius Júnior is explosive in 1v1 situations. Their conversion rates will stress opposition transitional shapes." },
            'Canada': { elo: 1780, xgAtt: 1.40, xgDef: 1.25, host: 0.25, depth: 5.5, insight: "Alphonso Davies represents an elite tactical weapon out wide, utilizing pure recovering speed to deny counters." },
            'Cape Verde': { elo: 1500, xgAtt: 0.90, xgDef: 1.70, host: 0.0, depth: 3.0, insight: "A fearless underdog with rapid wingers looking to aggressively exploit high defensive lines on the counter." },
            'Colombia': { elo: 1850, xgAtt: 1.60, xgDef: 1.10, host: 0.0, depth: 7.0, insight: "Luis Díaz brings unpredictable flair and pace to the left wing, constantly stretching defensive shapes." },
            'Ecuador': { elo: 1720, xgAtt: 1.30, xgDef: 1.20, host: 0.0, depth: 5.5, insight: "Moises Caicedo covers immense ground. A highly athletic squad that is dominant in midfield duels." },
            'Egypt': { elo: 1640, xgAtt: 1.20, xgDef: 1.30, host: 0.0, depth: 4.5, insight: "Mohamed Salah is the ultimate game-changer, capable of scoring from isolation even with limited possession." },
            'England': { elo: 2050, xgAtt: 2.10, xgDef: 0.70, host: 0.0, depth: 9.0, insight: "Jude Bellingham drives the midfield. They possess incredible squad depth and versatile attacking options off the bench." },
            'France': { elo: 2100, xgAtt: 2.30, xgDef: 0.65, host: 0.0, depth: 9.5, insight: "Kylian Mbappé's explosive pace is unmatched. They boast arguably the deepest talent pool in the tournament." },
            'Germany': { elo: 2000, xgAtt: 2.05, xgDef: 0.85, host: 0.0, depth: 8.5, insight: "Jamal Musiala provides elite creative spark. They rely heavily on high pressing and fluid attacking rotations." },
            'Ghana': { elo: 1600, xgAtt: 1.25, xgDef: 1.45, host: 0.0, depth: 5.0, insight: "Mohammed Kudus provides creative flair and a serious goal threat from central attacking midfield areas." },
            'Ivory Coast': { elo: 1650, xgAtt: 1.35, xgDef: 1.30, host: 0.0, depth: 5.5, insight: "Fast transitional play powered by a highly physical and dynamic box-to-box midfield presence." },
            'Japan': { elo: 1860, xgAtt: 1.50, xgDef: 1.15, host: 0.0, depth: 6.0, insight: "Kaoru Mitoma remains a lethal threat. Japan's disciplined mid-block relies on his progressive carries." },
            'Mexico': { elo: 1750, xgAtt: 1.45, xgDef: 1.20, host: 0.25, depth: 6.5, insight: "Edson Álvarez anchors the midfield. Mexico enjoys a massive home-continent crowd advantage pushing their tempo." },
            'Morocco': { elo: 1895, xgAtt: 1.65, xgDef: 1.10, host: 0.0, depth: 7.0, insight: "Achraf Hakimi provides rapid, overlapping transitions. They control dynamics beautifully through compact spacing." },
            'Netherlands': { elo: 1990, xgAtt: 2.10, xgDef: 0.80, host: 0.0, depth: 8.5, insight: "Cody Gakpo is the key focal point. Their high territorial pressure leaves gaps behind if bypassed effectively." },
            'Norway': { elo: 1730, xgAtt: 1.55, xgDef: 1.35, host: 0.0, depth: 6.0, insight: "Erling Haaland is an absolute force in the box. Early crosses and direct balls are highly effective for them." },
            'Paraguay': { elo: 1680, xgAtt: 1.05, xgDef: 1.15, host: 0.0, depth: 4.5, insight: "A gritty defensive low-block team that excels at frustrating high-possession sides with tactical fouling." },
            'Portugal': { elo: 2020, xgAtt: 2.15, xgDef: 0.75, host: 0.0, depth: 8.5, insight: "Bruno Fernandes orchestrates attacks, feeding a versatile and highly lethal front line." },
            'South Africa': { elo: 1690, xgAtt: 1.20, xgDef: 1.35, host: 0.0, depth: 3.5, insight: "Teboho Mokoena's deep distribution dictates their tempo. They struggle when forced to contain deeper squad rotations." },
            'South Korea': { elo: 1700, xgAtt: 1.35, xgDef: 1.25, host: 0.0, depth: 5.5, insight: "Son Heung-min's leadership and elite two-footed finishing make them incredibly dangerous on the counter-attack." },
            'Spain': { elo: 2050, xgAtt: 1.95, xgDef: 0.60, host: 0.0, depth: 9.0, insight: "Rodri controls the rhythm. They dominate possession and suffocate opponents with immediate counter-pressing." },
            'Sweden': { elo: 1740, xgAtt: 1.45, xgDef: 1.20, host: 0.0, depth: 6.0, insight: "Alexander Isak offers clinical finishing. They are heavily dangerous on attacking transitions and set-pieces." },
            'Switzerland': { elo: 1800, xgAtt: 1.40, xgDef: 1.10, host: 0.0, depth: 6.5, insight: "Granit Xhaka dictates the tempo. They feature a highly organized and notoriously resilient defensive unit." },
            'USA': { elo: 1940, xgAtt: 1.95, xgDef: 1.05, host: 0.25, depth: 7.5, insight: "Christian Pulisic drives creative progressions. Supported by a home crowd, they generate heavy overloads out wide." }
        };

        // Populate Dropdowns Dynamically
        const selectA = document.getElementById('teamA');
        const selectB = document.getElementById('teamB');
        Object.keys(teamsData).sort().forEach((team, index) => {
            selectA.options[selectA.options.length] = new Option(team, team, index === 0, index === 0);
            selectB.options[selectB.options.length] = new Option(team, team, index === 1, index === 1);
        });

        // Poisson Distribution Random Generator
        function getPoisson(lambda) {
            let L = Math.exp(-lambda);
            let k = 0, p = 1.0;
            do { k++; p *= Math.random(); } while (p > L && k < 100);
            return k - 1;
        }

        // Knockout Simulation Engine
        document.getElementById('simulateBtn').addEventListener('click', () => {
            const teamA = selectA.value;
            const teamB = selectB.value;

            if (teamA === teamB) {
                alert("Please select two different teams!");
                return;
            }

            const statsA = teamsData[teamA];
            const statsB = teamsData[teamB];

            // Adjust attack values dynamically relative to target opponent defensive stability and Elo differentials
            let lambdaA = Math.max(0.1, (statsA.xgAtt * statsB.xgDef / 1.2) + statsA.host + (statsA.elo - statsB.elo) * 0.0005);
            let lambdaB = Math.max(0.1, (statsB.xgAtt * statsA.xgDef / 1.2) + statsB.host - (statsA.elo - statsB.elo) * 0.0005);

            let winA = 0, winB = 0;
            let scoreLines = {}; // Store results of regular-time projections
            const simulations = 10000;

            for (let i = 0; i < simulations; i++) {
                // Regular Time (90 mins)
                let goalsA = getPoisson(lambdaA);
                let goalsB = getPoisson(lambdaB);

                let scoreKey = `${goalsA}-${goalsB}`;
                scoreLines[scoreKey] = (scoreLines[scoreKey] || 0) + 1;

                if (goalsA > goalsB) {
                    winA++;
                } else if (goalsB > goalsA) {
                    winB++;
                } else {
                    // Extra Time (30 mins)
                    let etGoalsA = getPoisson(lambdaA * 0.3);
                    let etGoalsB = getPoisson(lambdaB * 0.3);

                    if (etGoalsA > etGoalsB) {
                        winA++;
                    } else if (etGoalsB > etGoalsA) {
                        winB++;
                    } else {
                        // Penalty Shootout 
                        let psoWeightA = Math.min(Math.max(0.5 + (statsA.depth - statsB.depth) * 0.02, 0.35), 0.65);
                        if (Math.random() < psoWeightA) { winA++; } else { winB++; }
                    }
                }
            }

            // Extract the most frequent scoreline structure
            let mostFrequentScore = "0-0";
            let maxCount = 0;
            for (const [score, count] of Object.entries(scoreLines)) {
                if (count > maxCount) {
                    maxCount = count;
                    mostFrequentScore = score;
                }
            }
            let [predGoalsA, predGoalsB] = mostFrequentScore.split("-");

            const probA = (winA / simulations) * 100;
            const probB = (winB / simulations) * 100;

            // Render score display
            document.getElementById('predictedScore').innerText = `${predGoalsA} - ${predGoalsB}`;
            
            if (predGoalsA === predGoalsB) {
                let favoredWinner = probA > probB ? teamA : teamB;
                document.getElementById('overtimeNotice').innerText = `⚠️ Match projected to go to Extra Time/Penalties. ${favoredWinner} holds the edge to ultimately advance.`;
            } else {
                document.getElementById('overtimeNotice').innerText = "⚡ Projection based on 90-minute regulatory expectation.";
            }

            // Render custom team insights
            document.getElementById('matchInsight').innerHTML = `
                <strong>${teamA}:</strong> ${statsA.insight}<br><br>
                <strong>${teamB}:</strong> ${statsB.insight}
            `;

            // Render structural probability tracking bars
            document.getElementById('nameA').innerText = teamA;
            document.getElementById('probA').innerText = probA.toFixed(2) + "%";
            document.getElementById('barA').style.width = probA + "%";

            document.getElementById('nameB').innerText = teamB;
            document.getElementById('probB').innerText = probB.toFixed(2) + "%";
            document.getElementById('barB').style.width = probB + "%";

            document.getElementById('results').classList.remove('hidden');
        });
    </script>
</body>
</html>
